kind = "web"
previewPath = "/"
title = "比例消消 Ratio Chain"
version = "1.0.0"
id = "artifacts/ratio-chain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23805

[services.development]
run = "pnpm --filter @workspace/ratio-chain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ratio-chain", "run", "build" ]
publicDir = "artifacts/ratio-chain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23805"
BASE_PATH = "/"
